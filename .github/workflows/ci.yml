name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore Tests/Hum.Tests.csproj
      - run: dotnet build Tests/Hum.Tests.csproj --no-restore --configuration Release
      - run: dotnet test Tests/Hum.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: Tests/TestResults/
