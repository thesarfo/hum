<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hum</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="Hum.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            background:#000;
            gap:20px;
        ">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"
                 style="animation:spin 0.9s linear infinite;">
                <circle cx="20" cy="20" r="17" stroke="#1a1a1a" stroke-width="3"/>
                <path d="M20 3 A17 17 0 0 1 37 20" stroke="#0076dc" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="audioCapture.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
